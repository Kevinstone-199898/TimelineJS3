<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline 查看器</title>
  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; }

    /* ── 顶部导航 ── */
    nav {
      background: #1a1a2e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    nav a { color: #aab; text-decoration: none; font-size: 0.9em; }
    nav a:hover { color: #fff; }
    nav .sep { color: #555; }
    nav .current { color: #fff; font-weight: 600; flex: 1; }
    .nav-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #dde;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* ── 搜索面板 ── */
    #search-panel {
      display: none;
      position: absolute;
      top: 42px;
      right: 16px;
      width: 360px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      z-index: 1000;
      overflow: hidden;
    }
    #search-panel.open { display: block; }
    #search-input {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-bottom: 1px solid #eee;
      font-size: 0.95em;
      outline: none;
    }
    #search-results {
      max-height: 320px;
      overflow-y: auto;
    }
    .search-item {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.1s;
    }
    .search-item:hover { background: #f0f7ff; }
    .search-item .s-date { font-size: 0.78em; color: #888; margin-bottom: 2px; }
    .search-item .s-title { font-size: 0.92em; font-weight: 600; color: #222; }
    .search-item .s-group {
      display: inline-block;
      font-size: 0.72em;
      padding: 1px 6px;
      border-radius: 10px;
      background: #e8f0ff;
      color: #446;
      margin-top: 3px;
    }
    .search-empty { padding: 20px 16px; text-align: center; color: #aaa; font-size: 0.88em; }

    /* ── 添加事件模态框 ── */
    #add-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #add-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      width: 480px;
      max-width: 96vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.25);
    }
    .modal-box h3 { margin: 0 0 20px; font-size: 1.15em; color: #1a1a2e; }
    .form-row { display: flex; gap: 12px; margin-bottom: 14px; }
    .form-group { display: flex; flex-direction: column; flex: 1; }
    .form-group label { font-size: 0.8em; color: #666; margin-bottom: 4px; font-weight: 500; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 0.9em;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: #4285f4; }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      padding: 8px 18px; border: 1px solid #ddd; border-radius: 7px;
      background: #fff; cursor: pointer; font-size: 0.88em; color: #666;
    }
    .btn-cancel:hover { background: #f5f5f5; }
    .btn-submit {
      padding: 8px 20px; border: none; border-radius: 7px;
      background: #1a1a2e; color: #fff; cursor: pointer; font-size: 0.88em;
      font-weight: 600;
    }
    .btn-submit:hover { background: #2d2d4e; }

    /* ── 浮动事件操作栏 ── */
    #event-actions {
      display: none;
      position: fixed;
      bottom: 88px;
      right: 20px;
      background: rgba(20, 20, 40, 0.93);
      border-radius: 28px;
      padding: 7px 10px 7px 16px;
      gap: 7px;
      align-items: center;
      z-index: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      max-width: 340px;
      transition: opacity 0.2s;
    }
    #event-actions.visible { display: flex; }
    #event-actions-label {
      color: #ccd;
      font-size: 0.8em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .btn-ev-action {
      padding: 5px 13px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-size: 0.82em;
      font-weight: 600;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-ev-action:hover { opacity: 0.82; }
    #btn-edit-event  { background: #4285f4; color: #fff; }
    #btn-delete-event { background: #e53935; color: #fff; }

    /* ── URL 提取区 ── */
    .url-section {
      background: #f5f8ff;
      border: 1px solid #d0deff;
      border-radius: 9px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }
    .url-section .section-label {
      font-size: 0.78em;
      font-weight: 600;
      color: #446;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .url-row { display: flex; gap: 8px; align-items: center; }
    .url-row input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #c8d8ff;
      border-radius: 7px;
      font-size: 0.88em;
      outline: none;
      background: #fff;
    }
    .url-row input:focus { border-color: #4285f4; }
    .btn-extract {
      padding: 7px 14px;
      border: none;
      border-radius: 7px;
      background: #4285f4;
      color: #fff;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-extract:hover { background: #2b6de0; }
    .btn-extract:disabled { background: #a0b8f0; cursor: not-allowed; }
    .extract-status {
      margin-top: 8px;
      font-size: 0.82em;
      min-height: 18px;
    }
    .extract-status.loading { color: #4285f4; }
    .extract-status.ok { color: #1a7a3c; }
    .extract-status.err { color: #c00; }
    .apikey-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    .apikey-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #c8d8ff;
      border-radius: 7px;
      font-size: 0.83em;
      outline: none;
      background: #fff;
      font-family: monospace;
    }
    .apikey-row input:focus { border-color: #4285f4; }
    .apikey-row button {
      padding: 6px 12px;
      border: 1px solid #c8d8ff;
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
      font-size: 0.82em;
      color: #446;
    }
    .apikey-row button:hover { background: #eef2ff; }
    .apikey-toggle {
      font-size: 0.78em;
      color: #88a;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 6px;
      display: inline-block;
    }
    /* ── 多事件预览面板 ── */
    #extract-preview {
      display: none;
      margin-top: 10px;
      border: 1px solid #c8d8ff;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .preview-header {
      padding: 8px 12px;
      background: #eef3ff;
      font-size: 0.82em;
      color: #446;
      font-weight: 600;
      border-bottom: 1px solid #d8e6ff;
    }
    .preview-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #f0f4ff;
      gap: 8px;
    }
    .preview-item:last-child { border-bottom: none; }
    .preview-item-info { flex: 1; min-width: 0; }
    .preview-item-date { font-size: 0.75em; color: #888; }
    .preview-item-headline { font-size: 0.88em; font-weight: 600; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-item-group {
      display: inline-block;
      font-size: 0.7em;
      padding: 1px 6px;
      border-radius: 8px;
      background: #e8f0ff;
      color: #446;
      margin-top: 2px;
    }
    .preview-remove {
      flex-shrink: 0;
      border: none;
      background: none;
      color: #bbb;
      cursor: pointer;
      font-size: 1.1em;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
    }
    .preview-remove:hover { background: #fee; color: #e53935; }
    .preview-footer {
      padding: 8px 12px;
      background: #f8faff;
      border-top: 1px solid #e0e8ff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-footer span { font-size: 0.8em; color: #888; }
    .btn-add-all {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      background: #1a1a2e;
      color: #fff;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: 600;
    }
    .btn-add-all:hover { background: #2d2d4e; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: #bbb;
      font-size: 0.8em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    /* ── 导出提示 ── */
    #export-bar {
      display: none;
      background: #fffbe6;
      border-bottom: 1px solid #ffe58f;
      padding: 8px 20px;
      font-size: 0.85em;
      color: #555;
      align-items: center;
      gap: 12px;
    }
    #export-bar.visible { display: flex; }
    #export-bar strong { color: #333; }
    #btn-export {
      margin-left: auto;
      padding: 4px 14px;
      border: 1px solid #d4a017;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85em;
      color: #7a5400;
    }
    #btn-export:hover { background: #fffbe6; }

    #timeline-embed { width: 100%; height: calc(100vh - 42px); }
    #error {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: #c00;
      font-size: 1em;
      line-height: 1.8;
    }
    .tl-timegroup-message { color: #000 !important; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" id="nav-back">← 返回导航</a>
    <span class="sep">/</span>
    <span class="current" id="nav-title">Loading...</span>
    <button class="nav-btn" id="btn-search">🔍 <span data-i18n="search">搜索</span></button>
    <button class="nav-btn" id="btn-add">＋ <span data-i18n="add-event">添加事件</span></button>
    <button class="nav-btn" id="lang-toggle" style="min-width:38px">EN</button>
  </nav>

  <!-- 搜索面板 -->
  <div id="search-panel">
    <input id="search-input" type="text" data-i18n-ph="search-placeholder" placeholder="输入关键词搜索事件…">
    <div id="search-results"></div>
  </div>

  <!-- 已保存事件提示条 -->
  <div id="export-bar">
    <strong id="export-bar-msg"></strong>
    <button id="btn-clear" style="padding:4px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:0.85em;color:#c00;">🗑 <span data-i18n="clear-added">清除已添加</span></button>
    <button id="btn-export" style="margin-left:0">⬇ <span data-i18n="download-json">下载 JSON</span></button>
  </div>

  <!-- 添加事件模态框 -->
  <div id="add-overlay">
    <div class="modal-box">
      <h3 id="modal-title" data-i18n="modal-add">＋ 添加新事件</h3>

      <!-- URL 提取区 -->
      <div class="url-section">
        <div class="section-label" data-i18n="url-section-label">🔗 从网页链接提取</div>
        <div class="url-row">
          <input id="f-url" type="url" data-i18n-ph="url-placeholder" placeholder="粘贴网页链接，AI 自动提取信息…">
          <button class="btn-extract" id="btn-extract" data-i18n="btn-extract">提取信息</button>
        </div>
        <div class="extract-status" id="extract-status"></div>
        <!-- 多事件预览 -->
        <div id="extract-preview">
          <div class="preview-header" id="preview-header"></div>
          <div id="preview-list"></div>
          <div class="preview-footer">
            <span id="preview-hint" data-i18n="preview-hint">可点击 × 移除不需要的事件</span>
            <button class="btn-add-all" id="btn-add-all" data-i18n="btn-add-all">全部添加到时间轴</button>
          </div>
        </div>
        <span class="apikey-toggle" id="apikey-toggle" data-i18n="apikey-config">⚙ 配置 GLM API Key</span>
        <div class="apikey-row" id="apikey-row" style="display:none">
          <input id="f-apikey" type="password" placeholder="sk-ant-…">
          <button id="btn-save-key" data-i18n="save">保存</button>
        </div>
      </div>

      <div class="divider" data-i18n="or-manual">或手动填写</div>

      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label data-i18n="label-year">年份 *</label>
          <input id="f-year" type="number" data-i18n-ph="ph-year" placeholder="例：2024" min="1" max="9999">
        </div>
        <div class="form-group">
          <label data-i18n="label-month">月份</label>
          <input id="f-month" type="number" placeholder="1-12" min="1" max="12">
        </div>
        <div class="form-group">
          <label data-i18n="label-day">日期</label>
          <input id="f-day" type="number" placeholder="1-31" min="1" max="31">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="label-headline">标题 *</label>
          <input id="f-headline" type="text" data-i18n-ph="ph-headline" placeholder="事件标题">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="label-text">描述</label>
          <textarea id="f-text" data-i18n-ph="ph-text" placeholder="事件详细描述（可选）"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="label-group">分组</label>
          <input id="f-group" type="text" data-i18n-ph="ph-group" placeholder="例：产品、融资、里程碑（可选）" list="group-suggestions">
          <datalist id="group-suggestions"></datalist>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="label-source">来源链接</label>
          <input id="f-source" type="url" data-i18n-ph="ph-source" placeholder="https://… （将在事件中显示为「查看原文」链接）">
        </div>
      </div>
      <div id="form-error" style="color:#c00;font-size:0.83em;display:none;margin-top:-8px;"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-modal-cancel" data-i18n="cancel">取消</button>
        <button class="btn-submit" id="btn-modal-submit" data-i18n="modal-add-btn">添加到时间轴</button>
      </div>
    </div>
  </div>

  <!-- 浮动事件操作栏（查看某事件时显示） -->
  <div id="event-actions">
    <span id="event-actions-label"></span>
    <button class="btn-ev-action" id="btn-edit-event">✏️ <span data-i18n="edit">编辑</span></button>
    <button class="btn-ev-action" id="btn-delete-event">🗑 <span data-i18n="delete">删除</span></button>
  </div>

  <div id="error"></div>
  <div id="timeline-embed"></div>

        'status-ok-single': '✅ Extracted successfully — review and click Add',

        'status-remain': '✅ {n} events remaining',
        'apikey-saved-msg': 'API Key saved',
        'preview-header': 'Extracted {n} events — confirm to add:',
        'export-added': 'Added {n}', 'export-edited': 'Edited {n}', 'export-deleted': 'Deleted {n}',
        'export-suffix': ' events (persisted across refreshes)',
        'confirm-clear': 'Clear all local changes (added, edited, deleted)? This cannot be undone.',
        'confirm-delete': 'Delete "{title}"?',
        'search-loading': 'Data not loaded yet',
        'search-empty': 'No matching events found',
        'search-more': '{n} more results — keep typing to narrow down',
        'read-original': 'View Source',
      }
    };

    var currentLang = localStorage.getItem(LANG_KEY) || 'zh';

    function t(key, vars) {
      var s = (I18N[currentLang] || I18N.zh)[key] || key;
      if (vars) Object.keys(vars).forEach(function(k) { s = s.replace('{' + k + '}', vars[k]); });
      return s;
    }

    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem(LANG_KEY, lang);
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.getElementById('lang-toggle').textContent = t('lang-btn');
      document.getElementById('nav-back').textContent = t('nav-back');
      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        el.textContent = t(key);
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(function(el) {
        el.placeholder = t(el.getAttribute('data-i18n-ph'));
      });
      // API Key toggle label
      var toggleEl = document.getElementById('apikey-toggle');
      if (toggleEl) {
        toggleEl.textContent = getApiKey() ? t('apikey-saved') : t('apikey-config');
      }
    }

    var params = new URLSearchParams(window.location.search);
    var dataFile = params.get('data') || '';
    var title = params.get('title') || dataFile;

    document.title = title + ' · Timeline';
    document.getElementById('nav-title').textContent = title;
    document.getElementById('lang-toggle').addEventListener('click', function() {
      applyLang(currentLang === 'zh' ? 'en' : 'zh');
    });
    applyLang(currentLang);

    var timelineData = null;
    var tlInstance = null;
    var sortedEvents = [];
    var addedCount = 0;
    var baseEvents = [];        // 原始 JSON 事件，永不修改
    var eventMap = {};          // uid -> event，供操作栏查找
    var currentEventUid = null; // 当前浏览的事件 uid
    var editingUid = null;      // 编辑模式下的目标 uid

    var STORAGE_KEY  = 'tl_added_'   + dataFile;
    var DELETED_KEY  = 'tl_deleted_' + dataFile;
    var EDITS_KEY    = 'tl_edits_'   + dataFile;

    var GROUP_COLORS = {
      '政策': 'rgba(30, 90, 160, 0.25)',
      '研究': 'rgba(30, 140, 80, 0.25)',
      '产品': 'rgba(130, 50, 160, 0.25)',
      '融资': 'rgba(210, 90, 20, 0.25)',
      '合作': 'rgba(180, 150, 20, 0.25)',
      '里程碑': 'rgba(200, 30, 80, 0.15)',
      '硬件': 'rgba(20, 120, 160, 0.2)',
      '操作系统': 'rgba(80, 160, 40, 0.2)',
      '产业': 'rgba(160, 100, 20, 0.2)',
      '基础设施': 'rgba(100, 60, 160, 0.2)',
      '协议': 'rgba(20, 140, 120, 0.2)'
    };

    // ── 加载数据 ──
    if (!dataFile) {
      showError('缺少 ?data= 参数，请从<a href="index.html">导航页</a>进入。');
    } else {
      fetch('./' + dataFile)
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status + '：无法加载 ' + dataFile);
          return r.json();
        })
        .then(function(data) {
          timelineData = data;
          ensureUniqueIds(timelineData);
          baseEvents = (timelineData.events || []).slice(); // 保存原始快照
          applyLocalChanges();
          updateExportBar();
          buildTimeline();
          buildGroupSuggestions();
        })
        .catch(function(err) {
          showError(err.message + '<br><br>请确认文件 <code>' + dataFile + '</code> 存在，且通过 HTTP 服务器访问。');
        });
    }

    function buildTimeline(goToUid) {
      var embed = document.getElementById('timeline-embed');
      embed.innerHTML = '';
      tlInstance = new TL.Timeline('timeline-embed', timelineData, {
        language: 'zh-cn',
        timenav_position: 'bottom',
        start_at_slide: 1
      });
      tlInstance.on('ready', function() {
        colorGroups();
        buildSortedEvents();
        buildEventMap();
        if (goToUid) tlInstance.goToId(goToUid);
      });
      tlInstance.on('change', function(data) {
        colorGroups();
        var uid = data && data.unique_id;
        currentEventUid = (uid && eventMap[uid]) ? uid : null;
        var actionsEl = document.getElementById('event-actions');
        if (currentEventUid) {
          var ev = eventMap[currentEventUid];
          var hl = (ev.text && ev.text.headline) || '';
          document.getElementById('event-actions-label').textContent =
            hl.length > 28 ? hl.slice(0, 28) + '…' : hl;
          actionsEl.classList.add('visible');
        } else {
          actionsEl.classList.remove('visible');
        }
      });
    }

    function buildEventMap() {
      eventMap = {};
      if (!timelineData || !timelineData.events) return;
      timelineData.events.forEach(function(ev) {
        if (ev.unique_id) eventMap[ev.unique_id] = ev;
      });
    }

    // 构建按日期排序的事件数组（用于搜索）
    function buildSortedEvents() {
      if (!timelineData || !timelineData.events) return;
      sortedEvents = timelineData.events.slice().sort(function(a, b) {
        return dateNum(a.start_date) - dateNum(b.start_date);
      });
    }

    function dateNum(d) {
      if (!d) return 0;
      return parseInt(d.year || 0) * 10000 +
             parseInt(d.month || 0) * 100 +
             parseInt(d.day || 0);
    }

    function formatDate(d) {
      if (!d) return '';
      var s = d.year || '';
      if (d.month) s += '/' + d.month;
      if (d.day) s += '/' + d.day;
      return s;
    }

    function colorGroups() {
      document.querySelectorAll('.tl-timegroup').forEach(function(row) {
        var label = row.querySelector('.tl-timegroup-message');
        if (label) {
          var color = GROUP_COLORS[label.textContent.trim()];
          if (color) row.style.background = color;
        }
      });
    }

    // ── 搜索功能 ──
    var searchPanel = document.getElementById('search-panel');
    var searchInput = document.getElementById('search-input');
    var searchResults = document.getElementById('search-results');

    document.getElementById('btn-search').addEventListener('click', function(e) {
      e.stopPropagation();
      searchPanel.classList.toggle('open');
      if (searchPanel.classList.contains('open')) {
        searchInput.focus();
        renderSearch('');
      }
    });

    searchInput.addEventListener('input', function() {
      renderSearch(this.value);
    });

    document.addEventListener('click', function(e) {
      if (!searchPanel.contains(e.target) && e.target.id !== 'btn-search') {
        searchPanel.classList.remove('open');
      }
    });

    function renderSearch(query) {
      if (!sortedEvents.length) {
        searchResults.innerHTML = '<div class="search-empty">' + t('search-loading') + '</div>';
        return;
      }
      var q = query.trim().toLowerCase();
      var matched = q ? sortedEvents.filter(function(ev) {
        var h = (ev.text && ev.text.headline || '').toLowerCase();
        var b = (ev.text && ev.text.text || '').toLowerCase();
        var g = (ev.group || '').toLowerCase();
        return h.includes(q) || b.includes(q) || g.includes(q);
      }) : sortedEvents;

      if (!matched.length) {
        searchResults.innerHTML = '<div class="search-empty">' + t('search-empty') + '</div>';
        return;
      }

      var html = matched.slice(0, 50).map(function(ev) {
        var headline = ev.text && ev.text.headline || '（无标题）';
        var date = formatDate(ev.start_date);
        var group = ev.group || '';
        var uid = ev.unique_id || '';
        return '<div class="search-item" data-uid="' + escHtml(uid) + '">' +
          '<div class="s-date">' + escHtml(date) + '</div>' +
          '<div class="s-title">' + highlight(escHtml(headline), q) + '</div>' +
          (group ? '<span class="s-group">' + escHtml(group) + '</span>' : '') +
          '</div>';
      }).join('');
      if (matched.length > 50) {
        html += '<div class="search-empty">' + t('search-more', {n: matched.length - 50}) + '</div>';
      }
      searchResults.innerHTML = html;

      searchResults.querySelectorAll('.search-item').forEach(function(item) {
        item.addEventListener('click', function() {
          var uid = this.getAttribute('data-uid');
          if (uid && tlInstance) {
            tlInstance.goToId(uid);
          }
          searchPanel.classList.remove('open');
        });
      });
    }

    function highlight(text, q) {
      if (!q) return text;
      var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return text.replace(re, '<mark style="background:#ffe066;border-radius:2px">$1</mark>');
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── 编辑 / 删除事件 ──
    document.getElementById('btn-edit-event').addEventListener('click', function() {
      if (!currentEventUid || !eventMap[currentEventUid]) return;
      var ev = eventMap[currentEventUid];
      editingUid = currentEventUid;

      // 填入当前事件数据
      document.getElementById('f-year').value    = (ev.start_date && ev.start_date.year)  || '';
      document.getElementById('f-month').value   = (ev.start_date && ev.start_date.month) || '';
      document.getElementById('f-day').value     = (ev.start_date && ev.start_date.day)   || '';
      document.getElementById('f-headline').value = (ev.text && ev.text.headline) || '';
      document.getElementById('f-text').value    = (ev.text && ev.text.text)     || '';
      document.getElementById('f-group').value   = ev.group   || '';
      document.getElementById('f-source').value  = ev._source || '';

      // 切换为编辑模式 UI
      document.getElementById('modal-title').textContent = t('modal-edit');
      document.getElementById('btn-modal-submit').textContent = t('modal-save-btn');
      document.querySelector('.url-section').style.display = 'none';
      document.querySelector('.divider').style.display = 'none';

      document.getElementById('add-overlay').classList.add('open');
      document.getElementById('f-headline').focus();
    });

    document.getElementById('btn-delete-event').addEventListener('click', function() {
      if (!currentEventUid) return;
      var ev = eventMap[currentEventUid];
      var hl = (ev && ev.text && ev.text.headline) || currentEventUid;
      if (!confirm(t('confirm-delete', {title: hl}))) return;

      deleteEventByUid(currentEventUid);
      applyLocalChanges();
      buildTimeline();
      buildGroupSuggestions();
      updateExportBar();
      document.getElementById('event-actions').classList.remove('visible');
      currentEventUid = null;
    });

    // ── 添加事件功能 ──
    var addOverlay = document.getElementById('add-overlay');

    document.getElementById('btn-add').addEventListener('click', function() {
      addOverlay.classList.add('open');
      document.getElementById('f-year').focus();
    });
    document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
    addOverlay.addEventListener('click', function(e) {
      if (e.target === addOverlay) closeModal();
    });

    function closeModal() {
      addOverlay.classList.remove('open');
      document.getElementById('form-error').style.display = 'none';
      document.getElementById('f-url').value = '';
      document.getElementById('extract-preview').style.display = 'none';
      pendingExtracted = [];
      setExtractStatus('', '');
      // 重置编辑模式
      editingUid = null;
      document.getElementById('modal-title').textContent = t('modal-add');
      document.getElementById('btn-modal-submit').textContent = t('modal-add-btn');
      document.querySelector('.url-section').style.display = '';
      document.querySelector('.divider').style.display = '';
    }

    // ── API Key 管理 ──
    var API_KEY_STORAGE = 'tl_glm_api_key';

    function getApiKey() {
      return localStorage.getItem(API_KEY_STORAGE) || '';
    }

    (function initApiKeyUI() {
      var toggle = document.getElementById('apikey-toggle');
      var row = document.getElementById('apikey-row');
      var input = document.getElementById('f-apikey');
      var saveBtn = document.getElementById('btn-save-key');

      // 若已保存 key，显示已配置状态
      if (getApiKey()) {
        toggle.textContent = t('apikey-saved');
      }

      toggle.addEventListener('click', function() {
        var visible = row.style.display !== 'none';
        row.style.display = visible ? 'none' : 'flex';
        if (!visible) {
          input.value = getApiKey();
          input.focus();
        }
      });

      saveBtn.addEventListener('click', function() {
        var key = input.value.trim();
        if (key) {
          localStorage.setItem(API_KEY_STORAGE, key);
          toggle.textContent = t('apikey-saved');
          row.style.display = 'none';
          setExtractStatus('ok', t('apikey-saved-msg'));
          setTimeout(function() { setExtractStatus('', ''); }, 2000);
        }
      });
    })();

    // ── URL 提取逻辑 ──
    // ── 多事件预览 ──
    var pendingExtracted = []; // 当前待确认的提取结果
    var pendingSourceUrl = '';

    function renderExtractPreview(items, sourceUrl) {
      pendingExtracted = items.slice();
      pendingSourceUrl = sourceUrl;

      var list = document.getElementById('preview-list');
      list.innerHTML = pendingExtracted.map(function(ev, i) {
        var date = ev.year + (ev.month ? '/' + ev.month : '') + (ev.day ? '/' + ev.day : '');
        return '<div class="preview-item" data-idx="' + i + '">' +
          '<div class="preview-item-info">' +
            '<div class="preview-item-date">' + escHtml(date) + '</div>' +
            '<div class="preview-item-headline">' + escHtml(ev.headline || '') + '</div>' +
            (ev.group ? '<span class="preview-item-group">' + escHtml(ev.group) + '</span>' : '') +
          '</div>' +
          '<button class="preview-remove" title="移除">×</button>' +
        '</div>';
      }).join('');

      document.getElementById('preview-header').textContent = t('preview-header', {n: pendingExtracted.length});
      document.getElementById('extract-preview').style.display = 'block';

      list.querySelectorAll('.preview-remove').forEach(function(btn, i) {
        btn.addEventListener('click', function() {
          pendingExtracted.splice(i, 1);
          if (pendingExtracted.length === 0) {
            document.getElementById('extract-preview').style.display = 'none';
            setExtractStatus('', '');
          } else {
            renderExtractPreview(pendingExtracted, pendingSourceUrl);
            setExtractStatus('ok', t('status-remain', {n: pendingExtracted.length}));
          }
        });
      });
    }

    document.getElementById('btn-add-all').addEventListener('click', function() {
      if (!pendingExtracted.length) return;
      var lastUid = null;
      pendingExtracted.forEach(function(ev) {
        var uid = 'added_' + Date.now() + '_' + (++addedCount);
        var newEvent = buildEventObj(uid, ev.year, ev.month, ev.day, ev.headline, ev.text, ev.group, pendingSourceUrl);
        timelineData.events.push(newEvent);
        saveEvent(newEvent);
        lastUid = uid;
      });
      buildTimeline(lastUid);
      buildGroupSuggestions();
      updateExportBar();
      pendingExtracted = [];
      document.getElementById('extract-preview').style.display = 'none';
      closeModal();
    });

    function setExtractStatus(type, msg) {
      var el = document.getElementById('extract-status');
      el.className = 'extract-status' + (type ? ' ' + type : '');
      el.textContent = msg;
    }

    document.getElementById('btn-extract').addEventListener('click', async function() {
      var url = document.getElementById('f-url').value.trim();
      if (!url) {
        setExtractStatus('err', t('err-url-empty'));
        return;
      }
      var apiKey = getApiKey();
      if (!apiKey) {
        setExtractStatus('err', t('err-no-apikey'));
        document.getElementById('apikey-row').style.display = 'flex';
        document.getElementById('f-apikey').focus();
        return;
      }

      var btn = document.getElementById('btn-extract');
      btn.disabled = true;
      setExtractStatus('loading', t('status-fetching'));

      try {
        // Step 1: 通过 Jina Reader 获取网页正文（无 CORS 限制）
        var jinaRes = await fetch('https://r.jina.ai/' + url, {
          headers: { 'Accept': 'text/markdown', 'X-Return-Format': 'markdown' }
        });
        if (!jinaRes.ok) throw new Error('网页抓取失败 (HTTP ' + jinaRes.status + ')');
        var markdown = await jinaRes.text();

        setExtractStatus('loading', t('status-analyzing'));

        // Step 2: 调用 Claude API 提取结构化信息
        var prompt = [
          '请依次判断以下网页内容是否包含下列四类事件，每命中一类就生成一条独立记录。',
          '以 JSON 数组返回，不要输出任何其他内容。若全部不命中则返回空数组 []。',
          '',
          '【判断规则】',
          '',
          '1. 产品发布（group: "产品"）',
          '   命中条件：内容中包含公司新产品发布，或已有产品的新功能/新版本发布。',
          '   标题格式：产品/功能名称 + 发布/上线，如"Claude 3.5 Sonnet 发布"。',
          '   正文要求：说明产品/功能名称、核心能力或改进点。',
          '',
          '2. 融资进展（group: "融资"）',
          '   命中条件：内容中包含公司融资相关信息。',
          '   标题格式：必须包含"融资"二字，如"Anthropic 完成 30 亿美元 G 轮融资"。',
          '   正文要求：必须明确写出以下三项（如原文有）：',
          '   (a) 投资方名称',
          '   (b) 融资金额',
          '   (c) 投后估值',
          '',
          '3. 合作（group: "合作"）',
          '   命中条件：内容中包含该公司与其他公司/机构达成的合作、战略协议或集成。',
          '   标题格式：双方名称 + 合作性质，如"Anthropic 与 Google Cloud 达成战略合作"。',
          '   正文要求：说明合作方、合作内容及意义。',
          '',
          '4. 里程碑（group: "里程碑"）',
          '   命中条件：内容中包含以下任意一项重大数据：年度/季度收入、活跃用户数、产品用户规模、重大市场地位等。',
          '   标题格式：体现核心数字，如"Claude 月活用户突破 1 亿"。',
          '   正文要求：明确写出具体数字、统计周期及来源说明。',
          '',
          '【输出格式】每条记录结构如下（所有文字用中文）：',
          '{',
          '  "year": "年份（必填）",',
          '  "month": "月份（1-12，无则空字符串）",',
          '  "day": "日期（1-31，无则空字符串）",',
          '  "headline": "标题（遵循上述各类格式要求）",',
          '  "text": "正文（遵循上述各类内容要求）",',
          '  "group": "产品 | 融资 | 合作 | 里程碑"',
          '}',
          '',
          '网页内容：',
          markdown.slice(0, 5000)
        ].join('\n');

        var apiRes = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + apiKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'glm-4-flash',
            max_tokens: 2048,
            temperature: 0.3,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        var apiData = await apiRes.json();
        if (!apiRes.ok) {
          throw new Error(apiData.error && apiData.error.message || 'API 调用失败');
        }

        var raw = apiData.choices[0].message.content.trim();
        var jsonStr = raw.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/, '');
        var parsed = JSON.parse(jsonStr);
        // 兼容 AI 返回单个对象而非数组的情况
        var items = Array.isArray(parsed) ? parsed : [parsed];

        if (items.length === 1) {
          // 单条：填入表单，沿用原有流程
          var ev = items[0];
          document.getElementById('f-year').value     = ev.year     || '';
          document.getElementById('f-month').value    = ev.month    || '';
          document.getElementById('f-day').value      = ev.day      || '';
          document.getElementById('f-headline').value = ev.headline || '';
          document.getElementById('f-text').value     = ev.text     || '';
          document.getElementById('f-group').value    = ev.group    || '';
          document.getElementById('f-source').value   = url;
          document.getElementById('extract-preview').style.display = 'none';
          setExtractStatus('ok', t('status-ok-single'));
        } else {
          // 多条：显示预览面板，隐藏手动表单
          renderExtractPreview(items, url);
          setExtractStatus('ok', t('status-ok-multi', {n: items.length}));
        }
      } catch (e) {
        setExtractStatus('err', '❌ ' + e.message);
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('btn-modal-submit').addEventListener('click', function() {
      var year = document.getElementById('f-year').value.trim();
      var month = document.getElementById('f-month').value.trim();
      var day = document.getElementById('f-day').value.trim();
      var headline = document.getElementById('f-headline').value.trim();
      var text = document.getElementById('f-text').value.trim();
      var group  = document.getElementById('f-group').value.trim();
      var source = document.getElementById('f-source').value.trim();
      var errEl = document.getElementById('form-error');

      if (!year || !headline) {
        errEl.textContent = t('err-year-required');
        errEl.style.display = 'block';
        return;
      }
      if (isNaN(parseInt(year)) || parseInt(year) < 1) {
        errEl.textContent = t('err-year-invalid');
        errEl.style.display = 'block';
        return;
      }
      errEl.style.display = 'none';

      if (editingUid) {
        // ── 编辑已有事件 ──
        if (isCustomEvent(editingUid)) {
          // 直接更新 STORAGE_KEY 里的自定义事件
          var saved = loadSavedEvents();
          var idx = -1;
          saved.forEach(function(ev, i) { if (ev.unique_id === editingUid) idx = i; });
          if (idx !== -1) {
            saved[idx] = buildEventObj(editingUid, year, month, day, headline, text, group, source);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
          }
        } else {
          // 保存到 EDITS_KEY
          var edits = loadEdits();
          edits[editingUid] = { year: year, month: month, day: day, headline: headline, text: text, group: group, source: source };
          localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
        }
        var goUid = editingUid;
        applyLocalChanges();
        buildTimeline(goUid);
        buildGroupSuggestions();
        updateExportBar();
      } else {
        // ── 添加新事件 ──
        var uid = 'added_' + Date.now() + '_' + (++addedCount);
        var newEvent = buildEventObj(uid, year, month, day, headline, text, group, source);
        timelineData.events.push(newEvent);
        saveEvent(newEvent);
        buildTimeline(uid);
        buildGroupSuggestions();
        updateExportBar();
      }

      // 清空表单
      ['f-year','f-month','f-day','f-headline','f-text','f-group','f-source'].forEach(function(id) {
        document.getElementById(id).value = '';
      });
      closeModal();
    });

    // 导出 JSON
    document.getElementById('btn-export').addEventListener('click', function() {
      var json = JSON.stringify(timelineData, null, 2);
      var blob = new Blob([json], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = dataFile.replace('.json', '_modified.json');
      a.click();
      URL.revokeObjectURL(url);
    });

    // 清除所有本地修改
    document.getElementById('btn-clear').addEventListener('click', function() {
      if (!confirm(t('confirm-clear'))) return;
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(DELETED_KEY);
      localStorage.removeItem(EDITS_KEY);
      location.reload();
    });

    // ── localStorage 工具函数 ──
    function loadSavedEvents() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
    }
    function loadDeleted() {
      try { return JSON.parse(localStorage.getItem(DELETED_KEY) || '[]'); } catch(e) { return []; }
    }
    function loadEdits() {
      try { return JSON.parse(localStorage.getItem(EDITS_KEY) || '{}'); } catch(e) { return {}; }
    }

    function saveEvent(ev) {
      var saved = loadSavedEvents();
      saved.push(ev);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    }

    function isCustomEvent(uid) {
      return loadSavedEvents().some(function(ev) { return ev.unique_id === uid; });
    }

    function buildEventObj(uid, year, month, day, headline, text, group, source) {
      var ev = { unique_id: uid, start_date: { year: year }, text: { headline: headline } };
      if (month) ev.start_date.month = month;
      if (day)   ev.start_date.day   = day;
      var body = text || '';
      if (source) body += (body ? '<br><br>' : '') +
        '<a href="' + escHtml(source) + '" target="_blank" rel="noopener" ' +
        'style="font-size:0.85em;color:#4285f4;">📎 ' + t('read-original') + '</a>';
      if (body)  ev.text.text = body;
      if (group) ev.group     = group;
      if (source) ev._source  = source; // 保留原始 URL 供编辑时回填
      return ev;
    }

    function deleteEventByUid(uid) {
      if (isCustomEvent(uid)) {
        var saved = loadSavedEvents().filter(function(ev) { return ev.unique_id !== uid; });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      } else {
        var deleted = loadDeleted();
        if (deleted.indexOf(uid) === -1) deleted.push(uid);
        localStorage.setItem(DELETED_KEY, JSON.stringify(deleted));
        // 同时清除该事件的编辑记录
        var edits = loadEdits();
        delete edits[uid];
        localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
      }
    }

    // 从 baseEvents + 本地变更重建 timelineData.events
    function applyLocalChanges() {
      var deleted = loadDeleted();
      var edits   = loadEdits();
      var saved   = loadSavedEvents();

      var all = baseEvents.map(function(ev) {
        var edit = edits[ev.unique_id];
        if (!edit) return ev;
        return buildEventObj(ev.unique_id, edit.year, edit.month, edit.day, edit.headline, edit.text, edit.group, edit.source);
      }).filter(function(ev) {
        return deleted.indexOf(ev.unique_id) === -1;
      }).concat(saved);

      timelineData.events = all;
    }

    function updateExportBar() {
      var added   = loadSavedEvents().length;
      var deleted = loadDeleted().length;
      var edited  = Object.keys(loadEdits()).length;
      var total   = added + deleted + edited;
      var bar = document.getElementById('export-bar');
      if (total > 0) {
        var parts = [];
        if (added)   parts.push(t('export-added',   {n: added}));
        if (edited)  parts.push(t('export-edited',  {n: edited}));
        if (deleted) parts.push(t('export-deleted', {n: deleted}));
        document.getElementById('export-bar-msg').textContent =
          parts.join(' · ') + t('export-suffix');
        bar.classList.add('visible');
        document.getElementById('timeline-embed').style.height = 'calc(100vh - 42px - 38px)';
      } else {
        bar.classList.remove('visible');
        document.getElementById('timeline-embed').style.height = 'calc(100vh - 42px)';
      }
    }

    // 为分组输入框提供已有分组的建议
    function buildGroupSuggestions() {
      if (!timelineData || !timelineData.events) return;
      var groups = {};
      timelineData.events.forEach(function(ev) {
        if (ev.group) groups[ev.group] = true;
      });
      var dl = document.getElementById('group-suggestions');
      dl.innerHTML = Object.keys(groups).map(function(g) {
        return '<option value="' + escHtml(g) + '">';
      }).join('');
    }

    // 确保所有事件都有 unique_id（搜索导航需要）
    function ensureUniqueIds(data) {
      if (!data || !data.events) return;
      data.events.forEach(function(ev, i) {
        if (!ev.unique_id) ev.unique_id = 'ev_' + i;
      });
    }

    function showError(msg) {
      document.getElementById('timeline-embed').style.display = 'none';
      var el = document.getElementById('error');
      el.style.display = 'block';
      el.innerHTML = '⚠️ ' + msg;
    }
  </script>
</body>
</html>
